body:
  text: 楚竹書四民之父母子夏問於孔子詩曰凱俤君子民之父母敢問何如而可謂民之父母孔子答曰民之父母乎必達於禮樂之源以致五至以行三無以橫于天下四方有敗必先知之其之謂民之父母矣子夏曰敢問何謂五至孔子曰五至乎物之所至者志亦至焉志之所至者禮亦至焉禮之所至者樂亦至焉樂之所至者哀亦至焉哀樂相生君子以正此之謂五至子夏曰五至既聞之矣敢問何謂三無孔子曰三無乎無聲之樂無體之禮無服之喪君子以此皇于天下傾耳而聽之不可得而聞也明目而見之不可得而見也而得氣塞於四海矣此之謂三無子夏曰無聲之樂無體之禮無服之喪何詩是昵孔子曰善哉商也將可學詩矣成王不敢康夙夜其命又密無聲之樂威儀遲遲不可選也無體之禮也凡民有喪匍匐救之無服之喪也子夏曰其在詩也美矣宏矣大矣盡於此而已乎孔子曰何為其然猶有五起焉子夏曰可得而聞歟孔子曰無聲之樂氣志不違無體之禮威儀逮逮無服之喪內恕巽悲無聲之樂塞于四方無體之禮日逑月相無服之喪純德同明無聲之樂施及孫子無體之禮塞于四海無服之喪為民父母無聲之樂氣志既得無體之禮威儀翼翼無服之喪施及四國無聲之樂氣志既從無體之禮上下和同無服之喪以畜萬邦
